<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Card Clipping to maintain rounded corners rx=32 -->
    <clipPath id="bannerClip">
      <rect width="1200" height="260" rx="32"/>
    </clipPath>

    <!-- Background Gradient: Dark Blue Theme -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="40%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Wave Gradients (Blue-White Venom Theme) -->
    <linearGradient id="waveBlue1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="waveWhite" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="waveBlue2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>

    <!-- Text Gradients -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>

    <!-- Text Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Group clipped to rounded corner card -->
  <g clip-path="url(#bannerClip)">
    <!-- Background -->
    <rect width="1200" height="260" fill="url(#bg)"/>

    <!-- Decorative floating ambient light circles -->
    <circle cx="1100" cy="40" r="160" fill="#2563EB" opacity="0.15" filter="url(#glow)"/>
    <circle cx="100" cy="220" r="120" fill="#FFFFFF" opacity="0.05" filter="url(#glow)"/>

    <!-- Animated background particles/dots -->
    <g fill="#93C5FD">
      <circle cx="150" cy="60" r="3">
        <animate attributeName="opacity" values="0.1;0.9;0.1" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1020" cy="70" r="4">
        <animate attributeName="opacity" values="0.8;0.2;0.8" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="850" cy="50" r="2.5">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Animated Wave 1: Blue Gradient (Back Layer) -->
    <path fill="url(#waveBlue1)" opacity="0.4">
      <animate attributeName="d"
               dur="10s"
               repeatCount="indefinite"
               values="
                 M0,260 L0,180 Q300,140 600,190 Q900,240 1200,170 L1200,260 Z;
                 M0,260 L0,210 Q300,230 600,170 Q900,110 1200,200 L1200,260 Z;
                 M0,260 L0,180 Q300,140 600,190 Q900,240 1200,170 L1200,260 Z
               "/>
    </path>

    <!-- Animated Wave 2: White/Light-Blue (Middle Layer) -->
    <path fill="url(#waveWhite)" opacity="0.25">
      <animate attributeName="d"
               dur="14s"
               repeatCount="indefinite"
               values="
                 M0,260 L0,230 Q200,180 400,210 Q600,240 800,190 Q1000,140 1200,230 L1200,260 Z;
                 M0,260 L0,190 Q200,240 400,180 Q600,120 800,220 Q1000,320 1200,200 L1200,260 Z;
                 M0,260 L0,230 Q200,180 400,210 Q600,240 800,190 Q1000,140 1200,230 L1200,260 Z
               "/>
    </path>

    <!-- Animated Wave 3: Deep Royal Blue (Front Layer) -->
    <path fill="url(#waveBlue2)" opacity="0.6">
      <animate attributeName="d"
               dur="8s"
               repeatCount="indefinite"
               values="
                 M0,260 L0,210 Q300,250 600,190 Q900,130 1200,220 L1200,260 Z;
                 M0,260 L0,170 Q300,120 600,220 Q900,320 1200,180 L1200,260 Z;
                 M0,260 L0,210 Q300,250 600,190 Q900,130 1200,220 L1200,260 Z
               "/>
    </path>

    <!-- Main Title "Wahyu Tri" -->
    <text
        x="600"
        y="115"
        text-anchor="middle"
        font-size="64"
        font-weight="800"
        fill="url(#textGradient)"
        stroke="#1E3A8A"
        stroke-width="2.5"
        paint-order="stroke"
        filter="url(#glow)"
        font-family="system-ui, -apple-system, 'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        letter-spacing="1">
        Wahyu Tri
    </text>

    <!-- Subtitle -->
    <text
        x="600"
        y="160"
        text-anchor="middle"
        font-size="20"
        font-weight="500"
        fill="#BFDBFE"
        font-family="system-ui, -apple-system, 'Segoe UI', Inter, Helvetica, Arial, sans-serif"
        letter-spacing="2">
        React Developer • 3D Artist • Creative Builder
    </text>
  </g>
</svg>